<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 CatRoutine Pro v2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;font-family:sans-serif}
        body{background:#fef9ef;padding:12px}
        .box{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        h2{color:#d97706;font-size:1.05rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        label{font-size:0.85rem;font-weight:600;color:#64748b;display:block;margin-top:6px}
        input,select,button{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:0.95rem;margin:3px 0;box-sizing:border-box}
        button{background:#d97706;color:#fff;border:none;font-weight:bold;cursor:pointer}
        button:hover{background:#b45309}
        .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:bold;margin-right:4px}
        .b-vaccine{background:#dbeafe;color:#1e40af}
        .b-deworm{background:#fce7f3;color:#9d174d}
        .b-heart{background:#fee2e2;color:#991b1b}
        .b-dental{background:#e0e7ff;color:#3730a3}
        .b-food{background:#dcfce7;color:#166534}
        .b-groom{background:#fef3c7;color:#92400e}
        .card{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:10px;margin:6px 0}
        .flex{display:flex;align-items:center;gap:10px}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .done{opacity:0.5;text-decoration:line-through}
        .small{font-size:0.8rem;color:#666}
        .guide-box{background:#f0f9ff;padding:10px;border-radius:8px;border:1px solid #bae6fd;margin-top:6px;font-size:0.85rem}
        .guide-box strong{color:#0369a1}
        .food-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.7rem;margin:2px}
        .tag-high{background:#fecaca;color:#991b1b}
        .tag-mid{background:#fde68a;color:#92400e}
        .tag-low{background:#bbf7d0;color:#166534}
        .vet-btn{background:#03c75a;color:#fff;border:none;padding:10px;border-radius:8px;font-weight:bold;width:100%}
        .row{display:flex;gap:8px}
        .row>*{flex:1}
        .mt-2{margin-top:8px}
    </style>
</head>
<body>

    <h1 style="color:#d97706;font-size:1.4rem;margin-bottom:12px">🐱 CatRoutine Pro v2</h1>

    <!-- ===== 프로필 ===== -->
    <div class="box">
        <h2><i class="fa-solid fa-paw"></i> 내 고양이</h2>
        <div id="profileDisplay" style="display:none;background:#fef3c7;padding:10px;border-radius:8px;margin-bottom:10px">
            <span id="pName" style="font-weight:bold;font-size:1.1rem">냥이</span>
            <span id="pInfo" class="small">품종 · 12개월 · 중성화안함</span>
        </div>
        <input id="catName" placeholder="이름" value="나비">
        <select id="catBreed">
            <option>코리안숏헤어</option><option>샴</option><option>페르시안</option>
            <option>러시안블루</option><option>스코티시폴드</option><option>메인쿤</option><option>기타</option>
        </select>
        <input id="catAge" type="number" placeholder="나이(개월)" value="12">
        <select id="neutered"><option value="no">❌ 중성화 안 함</option><option value="yes">✅ 중성화 완료</option></select>
        <button onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> 프로필 저장</button>
    </div>

    <!-- ===== 사료 추천 ===== -->
    <div class="box" id="foodBox">
        <h2><i class="fa-solid fa-bowl-food"></i> 사료 추천</h2>
        <div id="foodContent"><p class="small">🐱 프로필을 저장해주세요</p></div>
    </div>

    <!-- ===== 케어 추가 ===== -->
    <div class="box">
        <h2><i class="fa-solid fa-sliders"></i> 케어 추가</h2>
        <select id="careSelect" onchange="showGuide()">
            <option value="">-- 선택 --</option>
            <option value="종합백신" data-time="morning" data-badge="백신" data-cls="b-vaccine">종합백신</option>
            <option value="광견병" data-time="morning" data-badge="백신" data-cls="b-vaccine">광견병 백신</option>
            <option value="구충제" data-time="morning" data-badge="구충" data-cls="b-deworm">구충제 (내부/외부)</option>
            <option value="심장사상충" data-time="morning" data-badge="심장" data-cls="b-heart">심장사상충 예방약</option>
            <option value="치아관리" data-time="evening" data-badge="치아" data-cls="b-dental">치아 관리 (칫솔질)</option>
            <option value="이도청소" data-time="evening" data-badge="치아" data-cls="b-dental">이도 청소</option>
            <option value="목욕" data-time="evening" data-badge="미용" data-cls="b-groom">목욕 / 그루밍</option>
            <option value="영양제" data-time="morning" data-badge="영양" data-cls="b-food">영양제 (오메가3/유산균)</option>
        </select>
        <div id="guideBox" class="guide-box" style="display:none"></div>
        <select id="careInterval">
            <option>매일</option><option>1주일</option><option>2주일</option>
            <option>1개월</option><option>3개월</option><option>6개월</option><option>1년</option>
        </select>
        <input id="careMemo" placeholder="메모 (선택)">
        <button onclick="addRoutine()"><i class="fa-solid fa-plus"></i> 추가</button>
    </div>

    <!-- ===== 루틴 목록 ===== -->
    <div id="routineList"></div>

    <!-- ===== 주변 병원 ===== -->
    <div class="box">
        <h2><i class="fa-solid fa-hospital"></i> 주변 병원</h2>
        <button class="vet-btn" onclick="findVet()"><i class="fa-solid fa-location-dot"></i> 내 주변 병원 찾기</button>
        <div id="vetResult" class="small" style="margin-top:8px"></div>
    </div>

    <button onclick="clearAll()" style="background:#ef4444"><i class="fa-solid fa-trash"></i> 전체 초기화</button>

    <script>
        // ===== 데이터 =====
        let routines = [];
        let profile = null;

        // ===== 케어 주기 가이드 =====
        const careGuide = {
            '종합백신': { base: '1년', note: '첫 접종 후 1년마다 추가 접종 권장' },
            '광견병': { base: '1년', note: '법정 필수 접종, 매년 갱신' },
            '구충제': { base: '3개월', note: '실내묘는 3~6개월, 실외묘는 1~3개월 간격' },
            '심장사상충': { base: '1개월', note: '모기 활동기(5~11월) 매월 투여, 겨울엔 생략 가능' },
            '치아관리': { base: '매일', note: '이가 쌓이면 치주염 위험, 매일 칫솔질 권장' },
            '이도청소': { base: '1주일', note: '귀지가 많은 품종(스핑크스, 페르시안)은 주 2회' },
            '목욕': { base: '1개월', note: '장모종은 1~2개월, 단모종은 2~3개월 간격' },
            '영양제': { base: '매일', note: '오메가3는 피부/관절에, 유산균은 장 건강에 도움' }
        };

        function showGuide() {
            const sel = document.getElementById('careSelect');
            const box = document.getElementById('guideBox');
            const val = sel.value;
            if (!val || !careGuide[val]) { box.style.display = 'none'; return; }
            const info = careGuide[val];
            const age = profile ? profile.age : 0;
            let extra = '';
            if (val === '종합백신' && age > 84) extra = '시니어묘는 항체가 확인 후 접종 권장';
            if (val === '구충제' && age < 6) extra = '키튼은 2주 간격으로 2~3회 구충 필요';
            box.innerHTML = `
                <strong>📌 권장 주기: ${info.base}</strong>
                <div>${info.note}</div>
                ${extra ? `<div style="color:#dc2626;font-weight:bold">⚠️ ${extra}</div>` : ''}
                ${profile && profile.neutered && val === '영양제' ? '💡 중성화묘는 체중 관리용 영양제 고려' : ''}
            `;
            box.style.display = 'block';
        }

        // ===== 프로필 =====
        function saveProfile() {
            profile = {
                name: document.getElementById('catName').value || '냥이',
                breed: document.getElementById('catBreed').value,
                age: parseInt(document.getElementById('catAge').value) || 12,
                neutered: document.getElementById('neutered').value === 'yes'
            };
            localStorage.setItem('catData', JSON.stringify({ profile, routines }));
            showProfile();
            showFood();
            showGuide();
        }

        function showProfile() {
            const d = document.getElementById('profileDisplay');
            if (profile) {
                d.style.display = 'block';
                document.getElementById('pName').textContent = profile.name;
                document.getElementById('pInfo').textContent = `${profile.breed} · ${profile.age}개월 · ${profile.neutered?'중성화완료':'중성화안함'}`;
            } else d.style.display = 'none';
        }

        // ===== 사료 추천 =====
        function showFood() {
            const box = document.getElementById('foodContent');
            if (!profile) {
                box.innerHTML = '<p class="small">🐱 프로필을 저장해주세요</p>';
                return;
            }
            const { age, neutered, breed } = profile;

            // 생애주기
            let stage = '어덜트 (성묘)';
            if (age < 6) stage = '키튼 (2~6개월)';
            else if (age < 12) stage = '주니어 (7~12개월)';
            else if (age >= 84) stage = '시니어 (7년 이상)';

            // 가격대별 브랜드
            const brands = {
                high: { name: '오리젠, 아카나, 노르딕내추럴', tag: '고가 (1kg 3만원~)' },
                mid: { name: '로얄캐닌, 힐즈, 이즈칸', tag: '중가 (1kg 1.5~2.5만원)' },
                low: { name: '닥터바이오, 네추럴코어, 애니모나', tag: '저가 (1kg 1만원 이하)' }
            };

            // 목적별 추천
            let purposeGuide = `
                <div style="margin-top:6px">
                    <span class="food-tag tag-high">⚖️ 체중관리: 로얄캐닌 라이트, 힐즈 메타볼릭</span>
                    <span class="food-tag tag-mid">💩 소화건강: 힐즈 i/d, 로얄캐닌 센서티브</span>
                    <span class="food-tag tag-low">🦷 치아건강: 힐즈 t/d, 로얄캐닌 덴탈</span>
                    <span class="food-tag tag-high">🐾 관절건강: 오리젠 시니어, 아카나 시니어</span>
                    <span class="food-tag tag-mid">🌿 털/피부: 오리젠 식스피쉬, 아카나 퍼시픽</span>
                </div>
            `;

            // 품종 특이사항
            let breedTip = '';
            if (breed === '페르시안' || breed === '스코티시폴드') breedTip = '💡 헤어볼 케어 사료 + 오메가3 보충 추천';
            else if (breed === '메인쿤') breedTip = '💡 대형묘, 관절 건강에 글루코사민 함유 사료 추천';
            else if (breed === '샴' || breed === '아비시니안') breedTip = '💡 활동량↑, 고단백 고에너지 사료 추천';

            box.innerHTML = `
                <div style="background:#fef3c7;padding:12px;border-radius:8px">
                    <p><strong>🐱 ${profile.name}님의 맞춤 사료</strong></p>
                    <p>📌 생애주기: <strong>${stage}</strong></p>
                    <p>${neutered ? '✅ 중성화 완료 → 체중 관리형 사료 권장' : '❌ 중성화 전 → 일반 성묘용 사료'}</p>
                </div>

                <div style="margin-top:8px">
                    <p><strong>💰 가격대별 추천 브랜드</strong></p>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
                        <span class="food-tag tag-high">${brands.high.name}</span>
                        <span class="food-tag tag-mid">${brands.mid.name}</span>
                        <span class="food-tag tag-low">${brands.low.name}</span>
                    </div>
                </div>

                <div style="margin-top:8px;background:#f0fdf4;padding:10px;border-radius:8px;border:1px solid #86efac">
                    <p><strong>🎯 목적별 추천</strong></p>
                    ${purposeGuide}
                </div>

                ${breedTip ? `<div style="margin-top:6px;background:#fef9c3;padding:8px;border-radius:6px;font-size:0.85rem">${breedTip}</div>` : ''}

                <div style="margin-top:6px;font-size:0.8rem;color:#64748b">
                    ⚠️ 사료 변경 시 7일간 기존 사료와 혼합 급여
                </div>
            `;
        }

        // ===== 루틴 추가 =====
        function addRoutine() {
            if (!profile) { alert('프로필 먼저 저장!'); return; }
            const sel = document.getElementById('careSelect');
            if (!sel.value) return alert('항목 선택!');
            const opt = sel.options[sel.selectedIndex];
            const item = {
                id: Date.now(),
                name: sel.value,
                time: opt.dataset.time || 'morning',
                badge: opt.dataset.badge || '케어',
                cls: opt.dataset.cls || 'b-vaccine',
                interval: document.getElementById('careInterval').value,
                memo: document.getElementById('careMemo').value,
                done: false
            };
            routines.push(item);
            localStorage.setItem('catData', JSON.stringify({ profile, routines }));
            render();
            document.getElementById('careMemo').value = '';
        }

        function toggleDone(id) {
            const item = routines.find(r => r.id === id);
            if (item) item.done = !item.done;
            localStorage.setItem('catData', JSON.stringify({ profile, routines }));
            render();
        }

        function deleteItem(id) {
            if (!confirm('삭제?')) return;
            routines = routines.filter(r => r.id !== id);
            localStorage.setItem('catData', JSON.stringify({ profile, routines }));
            render();
        }

        function render() {
            const container = document.getElementById('routineList');
            const slots = { morning: [], noon: [], evening: [] };
            routines.forEach(r => {
                if (slots[r.time]) slots[r.time].push(r);
                else slots.morning.push(r);
            });
            let html = '';
            for (const [time, items] of Object.entries(slots)) {
                const label = time === 'morning' ? '☀️ 아침' : time === 'noon' ? '⛅ 점심' : '🌙 저녁';
                html += `<div class="box"><h2>${label}</h2>`;
                if (items.length === 0) html += `<p class="small">등록된 루틴 없음</p>`;
                items.forEach(r => {
                    html += `
                        <div class="card ${r.done?'done':''}">
                            <div class="flex-between">
                                <div class="flex">
                                    <input type="checkbox" ${r.done?'checked':''} onchange="toggleDone(${r.id})">
                                    <span><span class="badge ${r.cls}">${r.badge}</span> ${r.name} <span class="small">(${r.interval})</span></span>
                                </div>
                                <button onclick="deleteItem(${r.id})" style="background:none;color:#ef4444;border:none;width:auto;padding:4px;font-size:1.2rem"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            ${r.memo ? `<div class="small">📝 ${r.memo}</div>` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }
            container.innerHTML = html || `<div class="box"><p class="small">등록된 루틴이 없습니다</p></div>`;
        }

        // ===== 병원 찾기 =====
        function findVet() {
            const result = document.getElementById('vetResult');
            if (!navigator.geolocation) {
                result.textContent = '❌ 위치 지원 안함';
                return;
            }
            result.textContent = '📍 위치 확인 중...';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    const url = `https://map.naver.com/p/search/동물병원?c=15.00,0,0,0,dh&lng=${longitude}&lat=${latitude}`;
                    result.innerHTML = `<a href="${url}" target="_blank" style="color:#03c75a;font-weight:bold;font-size:1rem">🐾 네이버 지도에서 주변 병원 보기</a>`;
                },
                () => { result.textContent = '❌ 위치 권한 필요 (설정에서 허용)'; }
            );
        }

        // ===== 초기화 =====
        function clearAll() {
            if (!confirm('모든 데이터 초기화?')) return;
            routines = [];
            profile = null;
            localStorage.removeItem('catData');
            showProfile();
            showFood();
            render();
            document.getElementById('vetResult').innerHTML = '';
            document.getElementById('guideBox').style.display = 'none';
        }

        // ===== 로드 =====
        const saved = localStorage.getItem('catData');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                profile = data.profile || null;
                routines = data.routines || [];
            } catch(e) {}
        }
        showProfile();
        showFood();
        render();
    </script>
</body>
</html>
