<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriRoutine Pro - 로컬 저장 버전</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-light: #e8f5e9;
            --primary-dark: #1b5e20;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-bottom: 60px; }
        
        header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 1.5rem; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); text-decoration: none; }

        main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 2rem; }
        
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.3rem; }
        input, select, textarea { width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid var(--border-color); font-size: 1rem; }
        button { width: 100%; padding: 0.8rem; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        .routine-list { margin-top: 2rem; }
        .routine-item { background: white; padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: none; color: #dc2626; border: none; cursor: pointer; padding: 0.5rem; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="fa-solid fa-file-medical"></i> NutriRoutine Pro (Local)</a>
    </header>

    <main>
        <div class="card">
            <div class="input-group">
                <label>영양제 이름</label>
                <input type="text" id="routine-name" placeholder="예: 종합비타민">
            </div>
            <button onclick="addRoutine()"><i class="fa-solid fa-plus"></i> 루틴 추가</button>
        </div>

        <div class="routine-list" id="routine-list">
            </div>
    </main>

    <footer style="text-align:center; padding:20px; font-size:0.8rem; color:#6c757d;">
        <p>본 서비스는 모든 데이터를 사용자 기기(브라우저)에만 저장하며, 개인정보를 수집하지 않습니다.</p>
    </footer>

    <script>
        let routines = JSON.parse(localStorage.getItem('myRoutines')) || [];

        function render() {
            const list = document.getElementById('routine-list');
            list.innerHTML = '';
            routines.forEach((item, index) => {
                list.innerHTML += `
                    <div class="routine-item">
                        <span>${item}</span>
                        <button class="delete-btn" onclick="deleteRoutine(${index})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function addRoutine() {
            const input = document.getElementById('routine-name');
            if (input.value.trim()) {
                routines.push(input.value);
                localStorage.setItem('myRoutines', JSON.stringify(routines));
                input.value = '';
                render();
            }
        }

        function deleteRoutine(index) {
            routines.splice(index, 1);
            localStorage.setItem('myRoutines', JSON.stringify(routines));
            render();
        }

        render();
    </script>
</body>
</html>
