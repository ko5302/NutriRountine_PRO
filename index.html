            .search-section, .timeline-slot { padding: 1rem; border-radius: 8px; }
            .slot-calendar-btn { width: 100%; justify-content: center; margin-top: 0.5rem; }
            .card-main { padding: 0.75rem; }
            .shop-btn-group { flex-direction: column; }
        }
    </style>
</head>

                <div class="input-group brand-box" id="brand-container">

                <div class="input-group">

        <section class="timeline-section">
            <div class="alert-box" id="interaction-alert">
                <div class="alert-flex">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size: 1.2rem;"></i>
                    <div id="alert-text"></div>
                </div>
                <div id="alert-affiliate-zone" style="margin-top:0.5rem; display:none;"></div>
            </div>

            <div class="timeline-slot slot-morning">
                <div class="slot-header">
                    <div class="slot-title" id="title-m"><i class="fa-solid fa-sun"></i> 아침 루틴 (07:00 ~ 09:00)</div>

                <div class="slot-header">
                    <div class="slot-title" id="title-n"><i class="fa-solid fa-cloud-sun"></i> 점심 루틴 (12:00 ~ 14:00)</div>
                    <a href="#" id="cal-btn-noon" class="slot-calendar-btn disabled" target="_blank"><i class="fa-brands fa-google"></i> 점심 루틴 등록</a>
                </div>
                <div class="routine-list" id="list-noon"><div class="empty-msg">지정된 일정이 없습니다.</div></div>
            </div>

            <div class="timeline-slot slot-evening">
                <div class="slot-header">
                    <div class="slot-title" id="title-e"><i class="fa-solid fa-moon"></i> 저녁 루틴 (19:00 ~ 21:00)</div>
                    <a href="#" id="cal-btn-evening" class="slot-calendar-btn disabled" target="_blank"><i class="fa-brands fa-google"></i> 저녁 루틴 등록</a>
                </div>
                <div class="routine-list" id="list-evening"><div class="empty-msg">지정된 일정이 없습니다.</div></div>
            </div>
        </section>
    </main>

    <script>
        const i18n = {
            ko: {
                logoText: "<i class='fa-solid fa-file-medical'></i> 영양루틴 프로",
                panelTitle: "<i class='fa-solid fa-sliders'></i> 커스텀 루틴 설정",
                lblSelectSupp: "1. 영양제 선택", optDefault: "-- 영양제를 선택하세요 --",
                lblBrandSpace: "1-1. 브랜드 선택 및 쇼핑몰 바로가기", lblCustomReg: "목록에 없는 영양제 직접 등록",
                lblStockCount: "초기 보유 수량 (알/Capsules)", lblTimeSet: "2. 복용 시간 세팅", lblFoodCond: "3. 식사 조건 매칭",
                btnM: "아침 (08:00)", btnN: "점심 (13:00)", btnE: "저녁 (20:00)", btnFb: "식전 공복", btnFa: "식후 즉시",
                btnAdd: "<i class='fa-solid fa-square-plus'></i> 내 맞춤 루틴에 적재",
                titleM: "<i class='fa-solid fa-sun'></i> 아침 루틴 (07:00 ~ 09:00)", titleN: "<i class='fa-solid fa-cloud-sun'></i> 점심 루틴 (12:00 ~ 14:00)", titleE: "<i class='fa-solid fa-moon'></i> 저녁 루틴 (19:00 ~ 21:00)",
                btnCalM: "<i class='fa-brands fa-google'></i> 아침 루틴 등록", btnCalN: "<i class='fa-brands fa-google'></i> 점심 루틴 등록", btnCalE: "<i class='fa-brands fa-google'></i> 저녁 루틴 등록",
                empty: "지정된 일정이 없습니다.", recommend: "권장 최적 시점 자동 적용됨", benefitLbl: "성분 기능성", tipLbl: "전문가 요령",
                alertDuplicate: "이미 동일 타임라인에 등록 완료된 동일 영양제가 존재합니다.", alertInput: "영양제 대상을 선택 혹은 직접 작성 완료해 주십시오.",
                stockSafe: "보유 수량", stockWarn: "소진 임박", stockDanger: "재구매 알림",
                reorderMsg: "[재구매 경고] 보유 수량이 7알 이하인 영양제가 있습니다. 아래 쇼핑몰에서 빠르게 구매하세요.",
                confirmDelete: "정말 삭제하시겠습니까?"
            },
            en: {
                logoText: "<i class='fa-solid fa-file-medical'></i> NutriRoutine Pro",
                panelTitle: "<i class='fa-solid fa-sliders'></i> Custom Routine Setup",
                lblSelectSupp: "1. Select Supplement", optDefault: "-- Select a supplement --",
                lblBrandSpace: "1-1. Brand & Shopping Mall", lblCustomReg: "Direct Registration",
                lblStockCount: "Current Stock (Pills)", lblTimeSet: "2. Set Intake Time", lblFoodCond: "3. Meal Condition",
                btnM: "Morning (08:00)", btnN: "Noon (13:00)", btnE: "Evening (20:00)", btnFb: "Before Meals", btnFa: "After Meals",
                btnAdd: "<i class='fa-solid fa-square-plus'></i> Add to Routine",
                titleM: "<i class='fa-solid fa-sun'></i> Morning Routine (07:00 ~ 09:00)", titleN: "<i class='fa-solid fa-cloud-sun'></i> Noon Routine (12:00 ~ 14:00)", titleE: "<i class='fa-solid fa-moon'></i> Evening Routine (19:00 ~ 21:00)",
                btnCalM: "<i class='fa-brands fa-google'></i> Add Morning", btnCalN: "<i class='fa-brands fa-google'></i> Add Noon", btnCalE: "<i class='fa-brands fa-google'></i> Add Evening",
                empty: "No schedules assigned.", recommend: "Recommended Timing Auto-Applied", benefitLbl: "Benefits", tipLbl: "Expert Tips",
                alertDuplicate: "Duplicate supplement in same timeline.", alertInput: "Please select or enter supplement.",
                stockSafe: "Stock Qty", stockWarn: "Low Stock", stockDanger: "Reorder",
                reorderMsg: "[Reorder Alert] Some items have 7 or fewer pills left. Buy now!",
                confirmDelete: "Are you sure you want to delete this item?"
            }
        };

        let currentLang = 'ko';
        let myRoutine = [];
        let currentUser = null;

        const selectEl = document.getElementById('supplement-select');
        const brandBox = document.getElementById('brand-container');
        const brandSelect = document.getElementById('brand-select');
        const brandCustom = document.getElementById('brand-custom');
        const customInput = document.getElementById('custom-name');
        const stockInput = document.getElementById('initial-stock');
        const addBtn = document.getElementById('add-btn');
        const guideBox = document.getElementById('recommend-guide-box');
        const langSwitcher = document.getElementById('lang-switcher');
        const authCloudBtn = document.getElementById('auth-cloud-btn');
        const promoText = document.getElementById('promo-text');
        const shopBtnGroup = document.getElementById('shop-btn-group');

        window.addEventListener('DOMContentLoaded', () => {
            initFirebaseAndAuth();
            checkAndResetDailyChecks();
            applyLanguage();
            updateUI();
        });

        function initFirebaseAndAuth() {
            setTimeout(() => {
                if (window.fbAuth) {
                    window.fbAuth.onAuthStateChanged(async (user) => {
                        if (user) {
                            currentUser = user;
                            authCloudBtn.innerText = "로그아웃";
                            authCloudBtn.classList.add('logout');
                            promoText.innerHTML = `🟢 클라우드 동기화 완료 (${user.displayName || user.email})`;
                            await syncFromFirebase();
                        } else {
                            currentUser = null;
                            authCloudBtn.innerHTML = `<i class="fa-brands fa-google"></i> 구글 계정 동기화`;
                            authCloudBtn.classList.remove('logout');
                            promoText.innerText = "⚠️ 현재 브라우저 저장소 모드입니다. 데이터를 클라우드에 영구 보존하세요.";
                            loadLocalStorageData();
                        }
                        updateUI();
                    });
                } else {
                    loadLocalStorageData();
                    updateUI();
                }
            }, 500);
        }

        authCloudBtn.addEventListener('click', async () => {
            if (!window.fbAuth) return;
            if (currentUser) {
                await window.signOut(window.fbAuth);
                myRoutine = [];
                localStorage.removeItem('myRoutineData');
            } else {
                try {
                    await window.signInWithPopup(window.fbAuth, window.fbProvider);
                } catch (error) {
                    console.error("Auth Error:", error);
                }
            }
        });

        async function syncToFirebase() {
            if (currentUser && window.fbDb) {
                const docRef = window.doc(window.fbDb, "users", currentUser.uid);
                await window.setDoc(docRef, { routine: myRoutine }, { merge: true });
            }
        }

        async function syncFromFirebase() {
            if (currentUser && window.fbDb) {
                const docRef = window.doc(window.fbDb, "users", currentUser.uid);
                const docSnap = await window.getDoc(docRef);
                if (docSnap.exists() && docSnap.data().routine) {
                    myRoutine = docSnap.data().routine;
                } else {
                    loadLocalStorageData();
                    if (myRoutine.length > 0) await syncToFirebase();
                }
            }
        }

        langSwitcher.addEventListener('change', (e) => {
            currentLang = e.target.value;
            applyLanguage();
            updateUI();
        });

        function applyLanguage() {
            const data = i18n[currentLang];
            document.getElementById('logo-text').innerHTML = data.logoText;
            document.getElementById('panel-title').innerHTML = data.panelTitle;
            document.getElementById('lbl-select-supp').innerText = data.lblSelectSupp;
            document.getElementById('opt-default').innerText = data.optDefault;
            document.getElementById('lbl-brand-space').innerText = data.lblBrandSpace;
            document.getElementById('lbl-custom-reg').innerText = data.lblCustomReg;
            document.getElementById('lbl-stock-count').innerText = data.lblStockCount;
            document.getElementById('lbl-time-set').innerText = data.lblTimeSet;
            document.getElementById('lbl-food-cond').innerText = data.lblFoodCond;
            document.getElementById('lbl-m').innerText = data.btnM;
            document.getElementById('lbl-n').innerText = data.btnN;
            document.getElementById('lbl-e').innerText = data.btnE;
            document.getElementById('lbl-fb').innerText = data.btnFb;
            document.getElementById('lbl-fa').innerText = data.btnFa;
            document.getElementById('add-btn').innerHTML = data.btnAdd;
            document.getElementById('title-m').innerHTML = data.titleM;
            document.getElementById('title-n').innerHTML = data.titleN;
            document.getElementById('title-e').innerHTML = data.titleE;
            document.getElementById('cal-btn-morning').innerHTML = data.btnCalM;
            document.getElementById('cal-btn-noon').innerHTML = data.btnCalN;
            document.getElementById('cal-btn-evening').innerHTML = data.btnCalE;
        }

        selectEl.addEventListener('change', () => {
            if (selectEl.value !== "") {
                customInput.value = "";
                customInput.disabled = true;
                customInput.style.backgroundColor = "#e9ecef";

                const opt = selectEl.options[selectEl.selectedIndex];
                const recTime = opt.getAttribute('data-time');
                const recFood = opt.getAttribute('data-food');
                const brandsStr = opt.getAttribute('data-brands');
                const iherbLinks = opt.getAttribute('data-iherb') || '';
                const naverLinks = opt.getAttribute('data-naver') || '';
                const coupangLinks = opt.getAttribute('data-coupang') || '';

                document.getElementById(`time-${recTime}`).checked = true;
                document.getElementById(`food-${recFood}`).checked = true;
                guideBox.innerHTML = `<div class="recommendation-badge"><i class="fa-solid fa-wand-magic-sparkles"></i> ${i18n[currentLang].recommend}</div>`;

                if (brandsStr) {
                    const brands = brandsStr.split(',');
                    const iherbArr = iherbLinks.split(',');
                    const naverArr = naverLinks.split(',');
                    const coupangArr = coupangLinks.split(',');

                    brandSelect.innerHTML = `<option value="">-- 브랜드를 선택하세요 --</option>`;
                    brands.forEach((b, idx) => {
                        const cleanName = b.replace(/_/g, ' ');
                        brandSelect.innerHTML += `
                            <option value="${cleanName}" 
                                    data-iherb="${iherbArr[idx] || '#'}" 
                                    data-naver="${naverArr[idx] || '#'}" 
                                    data-coupang="${coupangArr[idx] || '#'}">
                                ${cleanName}
                            </option>`;
                    });
                    brandBox.style.display = 'block';
                    shopBtnGroup.style.display = 'none';
                } else {
                    brandBox.style.display = 'none';
                }
            } else {
                customInput.disabled = false;
                customInput.style.backgroundColor = "#ffffff";
                brandBox.style.display = 'none';
                shopBtnGroup.style.display = 'none';
                guideBox.innerHTML = '';
            }
        });

        brandSelect.addEventListener('change', () => {
            const selectedOpt = brandSelect.options[brandSelect.selectedIndex];
            if (brandSelect.value !== "" && selectedOpt) {
                brandCustom.value = "";
                const iUrl = selectedOpt.getAttribute('data-iherb') || '#';
                const nUrl = selectedOpt.getAttribute('data-naver') || '#';
                const cUrl = selectedOpt.getAttribute('data-coupang') || '#';

                shopBtnGroup.innerHTML = `
                    <a href="${iUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn iherb ${iUrl === '#' ? 'disabled' : ''}"><i class="fa-solid fa-leaf"></i> iHerb</a>
                    <a href="${nUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn naver ${nUrl === '#' ? 'disabled' : ''}"><i class="fa-brands fa-naver"></i> 네이버</a>
                    <a href="${cUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn coupang ${cUrl === '#' ? 'disabled' : ''}"><i class="fa-solid fa-cart-shopping"></i> 쿠팡</a>
                `;
                shopBtnGroup.style.display = 'flex';
            } else {
                shopBtnGroup.style.display = 'none';
            }
        });

        brandCustom.addEventListener('input', () => {
            if (brandCustom.value.trim() !== "") {
                brandSelect.value = "";
                shopBtnGroup.style.display = 'none';
            }
        });

        addBtn.addEventListener('click', async () => {
            let name = "", brand = "", iherbUrl = "", naverUrl = "", coupangUrl = "";
            let tip = "식사 직후 충분한 물과 함께 복용하세요.", benefit = "종합 건강 관리";
            let time = document.querySelector('input[name="routine-time"]:checked').value;
            let food = document.querySelector('input[name="routine-food"]:checked').value;
            let stock = parseInt(stockInput.value) || 60;

            if (brandSelect.value !== "") {
                brand = brandSelect.value;
                const opt = brandSelect.options[brandSelect.selectedIndex];
                iherbUrl = opt.getAttribute('data-iherb') || "";
                naverUrl = opt.getAttribute('data-naver') || "";
                coupangUrl = opt.getAttribute('data-coupang') || "";
            } else if (brandCustom.value.trim() !== "") {
                brand = brandCustom.value.trim();
            }

            if (selectEl.value !== "") {
                const opt = selectEl.options[selectEl.selectedIndex];
                name = currentLang === 'ko' ? opt.text : opt.value;
                tip = opt.getAttribute('data-tip');
                benefit = opt.getAttribute('data-benefit');
            } else if (customInput.value.trim() !== "") {
                name = customInput.value.trim();
            } else {
                alert(i18n[currentLang].alertInput);
                return;
            }

            if (myRoutine.some(item => item.name === name && item.time === time)) {
                alert(i18n[currentLang].alertDuplicate);
                return;
            }

            const newItem = {
                id: Date.now(),
                name,
                brand,
                time,
                food,
                tip,
                benefit,
                stock,
                iherbUrl,
                naverUrl,
                coupangUrl,
                takenToday: false,
                active: false
            };
            myRoutine.push(newItem);

            saveLocalStorageData();
            await syncToFirebase();
            updateUI();

            selectEl.value = "";
            customInput.value = "";
            customInput.disabled = false;
            customInput.style.backgroundColor = "#ffffff";
            brandBox.style.display = 'none';
            brandSelect.innerHTML = "";
            brandCustom.value = "";
            stockInput.value = "60";
            guideBox.innerHTML = '';
            shopBtnGroup.style.display = 'none';
        });

        window.deleteItem = async function(id, event) {
            event.stopPropagation();
            if (!confirm(i18n[currentLang].confirmDelete)) return;
            myRoutine = myRoutine.filter(item => item.id !== id);
            saveLocalStorageData();
            await syncToFirebase();
            updateUI();
        };

        window.toggleCard = function(id) {
            myRoutine = myRoutine.map(item =>
                item.id === id ? { ...item, active: !item.active } : item
            );
            updateUI();
        };

        window.toggleTakeComplete = async function(id, event) {
            event.stopPropagation();
            myRoutine = myRoutine.map(item => {
                if (item.id === id) {
                    const isChecking = !item.takenToday;
                    let newStock = isChecking ? Math.max(0, item.stock - 1) : item.stock + 1;
                    return { ...item, takenToday: isChecking, stock: newStock };
                }
                return item;
            });
            saveLocalStorageData();
            await syncToFirebase();
            updateUI();
        };

        function updateUI() {
            const slots = {
                morning: document.getElementById('list-morning'),
                noon: document.getElementById('list-noon'),
                evening: document.getElementById('list-evening')
            };

            Object.keys(slots).forEach(key => slots[key].innerHTML = "");

            myRoutine.forEach(item => {
                const card = document.createElement('div');
                card.className = `routine-card ${item.active ? 'active' : ''} ${item.takenToday ? 'taken-today' : ''}`;

                const foodBadgeHtml = item.food === 'before'
                    ? `<span class="badge badge-food-before"><i class="fa-solid fa-droplet-slash"></i> 식전 공복</span>`
                    : `<span class="badge badge-food-after"><i class="fa-solid fa-utensils"></i> 식후 즉시</span>`;

                const brandHtml = item.brand ? `<span class="brand-badge">${item.brand}</span>` : '';

                let stockBadgeClass = "badge-stock-safe";
                let stockStatusText = i18n[currentLang].stockSafe;
                if (item.stock <= 7) {
                    stockBadgeClass = "badge-stock-danger";
                    stockStatusText = i18n[currentLang].stockDanger;
                } else if (item.stock <= 14) {
                    stockBadgeClass = "badge-stock-warn";
                    stockStatusText = i18n[currentLang].stockWarn;
                }

                const stockBadgeHtml = `<span class="badge ${stockBadgeClass}"><i class="fa-solid fa-box-archive"></i> ${stockStatusText}: ${item.stock}알</span>`;

                let innerShopButtons = "";
                if (item.iherbUrl && item.iherbUrl !== '#') {
                    innerShopButtons += `<a href="${item.iherbUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn iherb" style="padding:0.4rem 0.6rem; font-size:0.75rem; width:auto; display:inline-flex;"><i class="fa-solid fa-leaf"></i> iHerb</a>`;
                }
                if (item.naverUrl && item.naverUrl !== '#') {
                    innerShopButtons += `<a href="${item.naverUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn naver" style="padding:0.4rem 0.6rem; font-size:0.75rem; width:auto; display:inline-flex;"><i class="fa-brands fa-naver"></i> 네이버</a>`;
                }
                if (item.coupangUrl && item.coupangUrl !== '#') {
                    innerShopButtons += `<a href="${item.coupangUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn coupang" style="padding:0.4rem 0.6rem; font-size:0.75rem; width:auto; display:inline-flex;"><i class="fa-solid fa-cart-shopping"></i> 쿠팡</a>`;
                }

                const shopContainerHtml = innerShopButtons !== "" 
                    ? `<div class="shop-btn-group" style="margin-top: 0.8rem; display: flex; gap: 0.4rem; width: 100%; flex-direction: row;">${innerShopButtons}</div>` 
                    : "";

                card.innerHTML = `
                    <div class="card-main" onclick="toggleCard(${item.id})">
                        <div class="card-left-section">
                            <div class="pill-toggle-container" onclick="toggleTakeComplete(${item.id}, event)">
                                <div class="pill-wrapper">
                                    <div class="pill-part pill-top"></div>
                                    <div class="pill-part pill-bottom"></div>
                                </div>
                            </div>
                            <div class="routine-info">
                                <h4>${brandHtml} ${item.name} ${foodBadgeHtml} ${stockBadgeHtml}</h4>
                            </div>
                        </div>
                        <div class="card-controls">
                            <i class="fa-solid fa-chevron-down toggle-icon"></i>
                            <button class="delete-btn" onclick="deleteItem(${item.id}, event)"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="card-detail">
                        <div class="detail-content">
                            <p><strong><i class="fa-solid fa-star" style="color:#eab308;"></i> ${i18n[currentLang].benefitLbl}:</strong> ${item.benefit}</p>
                            <p><strong><i class="fa-solid fa-circle-exclamation" style="color:var(--primary-color)"></i> ${i18n[currentLang].tipLbl}:</strong> ${item.tip}</p>
                            ${shopContainerHtml}
                        </div>
                    </div>
                `;
                slots[item.time].appendChild(card);
            });

            Object.keys(slots).forEach(key => {
                if (slots[key].children.length === 0) {
                    slots[key].innerHTML = `<div class="empty-msg">${i18n[currentLang].empty}</div>`;
                }
            });

            checkInteractionsAndStockAlerts();
            updateSlotCalendarLinks();
        }

        function checkInteractionsAndStockAlerts() {
            const alertBox = document.getElementById('interaction-alert');
            const alertText = document.getElementById('alert-text');
            const alertAffZone = document.getElementById('alert-affiliate-zone');
            let warnings = [];
            let dangerItems = [];

            const names = myRoutine.map(i => i.name);
            if ((names.includes('칼슘') || names.includes('Calcium')) && (names.includes('철분') || names.includes('Iron'))) {
                const c = myRoutine.find(i => i.name === '칼슘' || i.name === 'Calcium');
                const f = myRoutine.find(i => i.name === '철분' || i.name === 'Iron');
                if (c && f && c.time === f.time) {
                    warnings.push(`[복용 주의] 칼슘과 철분이 동일 시간대에 적재되었습니다. 두 성분은 흡수 경로가 겹쳐 동시 섭취 시 효율이 떨어집니다.`);
                }
            }

            myRoutine.forEach(item => { if (item.stock <= 7) dangerItems.push(item); });
            if (dangerItems.length > 0) warnings.push(i18n[currentLang].reorderMsg);

            if (warnings.length > 0) {
                alertText.innerHTML = warnings.join('<br><br>');
                alertBox.style.display = 'flex';

                if (dangerItems.length > 0) {
                    alertBox.classList.add('danger-alert');
                    let affHtml = '<div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.3rem;">';
                    dangerItems.forEach(di => {
                        if (di.iherbUrl && di.iherbUrl !== '#') {
                            affHtml += `<a href="${di.iherbUrl}" target="_blank" rel="noopener noreferrer" class="shop-btn iherb" style="padding:0.3rem 0.6rem; font-size:0.75rem; margin:0; width:auto;"><i class="fa-solid fa-leaf"></i> ${di.name} iHerb 긴급 충전</a>`;
                        }
                    });
                    affHtml += '</div>';
                    alertAffZone.innerHTML = affHtml;
                    alertAffZone.style.display = 'block';
                } else {
                    alertBox.classList.remove('danger-alert');
                    alertAffZone.style.display = 'none';
                }
            } else {
                alertBox.style.display = 'none';
                alertBox.classList.remove('danger-alert');
                alertAffZone.style.display = 'none';
            }
        }

        function updateSlotCalendarLinks() {
            const timeSlots = ['morning', 'noon', 'evening'];
            const hours = { morning: '08', noon: '13', evening: '20' };
            const todayStr = new Date().toISOString().split('T')[0].replace(/-/g, '');

            timeSlots.forEach(slot => {
                const btn = document.getElementById(`cal-btn-${slot}`);
                const subList = myRoutine.filter(i => i.time === slot);

                if (subList.length === 0) {
                    btn.classList.add('disabled');
                    btn.href = "#";
                    return;
                }

                btn.classList.remove('disabled');
                let title = "[NutriRoutine]";
                let bodyText = `■ ${title} ■\n\n`;

                subList.forEach(i => {
                    const b = i.brand ? `[${i.brand}] ` : '';
                    const fText = i.food === 'before' ? '식전 공복' : '식후 즉시';
                    bodyText += `• ${b}${i.name} (${fText}) [잔여:${i.stock}알]\n  - 기능성: ${i.benefit}\n  - 요령: ${i.tip}\n\n`;
                });

                const baseUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
                const dateParam = `${todayStr}T${hours[slot]}0000/${todayStr}T${hours[slot]}3000`;
                btn.href = `${baseUrl}&text=${encodeURIComponent(title)}&dates=${dateParam}&details=${encodeURIComponent(bodyText)}&recur=RRULE:FREQ=DAILY`;
            });
        }

        function saveLocalStorageData() {
            localStorage.setItem('myRoutineData', JSON.stringify(myRoutine));
        }

        function loadLocalStorageData() {
            const data = localStorage.getItem('myRoutineData');
            if (data) {
                try { myRoutine = JSON.parse(data); } catch (e) { myRoutine = []; }
            }
        }

        function checkAndResetDailyChecks() {
            const lastCheckDate = localStorage.getItem('lastRoutineCheckDate');
            const todayStr = new Date().toISOString().split('T')[0];
            if (lastCheckDate !== todayStr) {
                myRoutine = myRoutine.map(item => ({ ...item, takenToday: false }));
                localStorage.setItem('lastRoutineCheckDate', todayStr);
                saveLocalStorageData();
            }
        }
    </script>
</body>
</html>
